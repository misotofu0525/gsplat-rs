[graph]
all-features = true

[advisories]
ignore = [
  { id = "RUSTSEC-2024-0436", reason = "paste is an unmaintained transitive dependency of wgpu's Metal backend; no safe upstream upgrade is currently available" },
  { id = "RUSTSEC-2026-0192", reason = "ttf-parser is an unmaintained transitive dependency of the optional winit viewer; no safe upstream upgrade is currently available" },
  { id = "RUSTSEC-2026-0194", reason = "quick-xml is used by wayland-scanner only on trusted dependency-owned protocol XML at build time; latest stable wayland-scanner still requires quick-xml below the fixed release" },
  { id = "RUSTSEC-2026-0195", reason = "quick-xml is used by wayland-scanner only on trusted dependency-owned protocol XML at build time; latest stable wayland-scanner still requires quick-xml below the fixed release" },
]
git-fetch-with-cli = true

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "ISC",
  "MIT",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "simplest-path"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
