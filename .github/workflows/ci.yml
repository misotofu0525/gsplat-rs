name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt, clippy
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Cargo fmt
        run: cargo fmt --check
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rustdoc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps
      - name: Web demo JavaScript syntax
        run: node --check apps/web-demo/src/main.js
      - name: Web SDK JavaScript syntax
        run: node --check apps/web-demo/gsplat-web-sdk/src/index.js
      - name: Web wasm check
        run: |
          rustup target add wasm32-unknown-unknown
          cargo check -p gsplat-web --target wasm32-unknown-unknown
      - name: Cargo check
        run: cargo check --workspace
      - name: Cargo test
        run: cargo test --workspace
      - name: C ABI smoke
        run: bash tests/ffi/run-ffi-smoke.sh
      - name: JNI smoke
        run: bash apps/android-demo/run-jni-smoke.sh
      - name: Stability smoke (short)
        env:
          STABILITY_SECONDS: "5"
          RSS_GROWTH_LIMIT_KIB: "262144"
        run: bash tests/perf/run-long-stability.sh

  check-macos-swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
      - name: Swift smoke
        run: bash apps/ios-demo/run-swift-smoke.sh
      - name: iOS simulator target build
        run: bash apps/ios-demo/build-ios-sim.sh
      - name: iOS XCFramework build
        run: bash apps/ios-demo/build-xcframework.sh
      - name: GsplatKit package build
        run: cd apps/ios-demo/GsplatKit && xcodebuild -scheme GsplatKit -destination 'generic/platform=iOS Simulator' build
