name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@45f5412a0cc5dee553bb061a37369fc8e63fa137 # 1.93.0
        with:
          components: rustfmt, clippy
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - name: Install headless Vulkan runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends libvulkan1 mesa-vulkan-drivers
      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;29.0.14206865"
      - name: Cargo fmt
        run: cargo fmt --check
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rustdoc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps
      - name: Web example JavaScript syntax
        run: node --check examples/web/src/main.js
      - name: Web SDK JavaScript syntax
        run: npm --prefix packages/web run check
      - name: Web SDK JavaScript tests
        run: npm --prefix packages/web test
      - name: Web wasm check
        run: |
          rustup target add wasm32-unknown-unknown
          cargo check -p gsplat-web --target wasm32-unknown-unknown
      - name: Web SDK dist build
        run: |
          cargo install wasm-bindgen-cli --version 0.2.121 --locked
          bash packages/web/scripts/build.sh
          node --check packages/web/dist/index.js
          npm --prefix packages/web run pack:dry-run
      - name: Cargo check
        run: cargo check --workspace
      - name: Cargo test
        run: cargo test --workspace
      - name: C ABI smoke
        run: bash tests/ffi/run-ffi-smoke.sh
      - name: JNI smoke
        run: bash bindings/android/scripts/run-jni-smoke.sh
      - name: Android AAR build
        run: |
          ANDROID_SDK_ROOT="$ANDROID_HOME" bash bindings/android/scripts/build-aar.sh
          test -f bindings/android/gsplat-android/build/outputs/aar/gsplat-android-release.aar
      - name: Android sample APK build
        run: |
          ANDROID_SDK_ROOT="$ANDROID_HOME" bash bindings/android/scripts/build-sample-apk.sh
          test -f examples/android/app/build/outputs/apk/debug/sample-app-debug.apk

  check-macos-swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@45f5412a0cc5dee553bb061a37369fc8e63fa137 # 1.93.0
      - name: GPU pixel conformance
        env:
          GSPLAT_REQUIRE_GPU_CONFORMANCE: "1"
        run: cargo test -p gsplat-render-wgpu --test conformance_sorted_alpha
      - name: Stability smoke (short)
        env:
          STABILITY_SECONDS: "5"
          RSS_GROWTH_LIMIT_KIB: "262144"
        run: bash tests/perf/run-long-stability.sh
      - name: Swift smoke
        run: bash bindings/apple/scripts/run-swift-smoke.sh
      - name: iOS simulator target build
        run: bash bindings/apple/scripts/build-ios-sim.sh
      - name: iOS XCFramework build
        run: bash bindings/apple/scripts/build-xcframework.sh
      - name: GsplatKit package build
        run: cd bindings/apple/GsplatKit && xcodebuild -scheme GsplatKit -destination 'generic/platform=iOS Simulator' build

  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@45f5412a0cc5dee553bb061a37369fc8e63fa137 # 1.93.0
      - name: Cargo dependency policy
        run: bash tests/security/run-cargo-deny.sh
