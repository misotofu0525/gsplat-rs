name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@45f5412a0cc5dee553bb061a37369fc8e63fa137 # 1.93.0
        with:
          components: rustfmt, clippy
      - name: Install headless Vulkan runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends libvulkan1 mesa-vulkan-drivers
      - name: Cargo fmt
        run: cargo fmt --check
      - name: Release version consistency
        run: bash tests/release/check-version.sh
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cargo test
        run: cargo test --workspace
      - name: Cargo check
        run: cargo check --workspace
      - name: Rustdoc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps
      - name: C ABI smoke
        run: bash tests/ffi/run-ffi-smoke.sh

  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@45f5412a0cc5dee553bb061a37369fc8e63fa137 # 1.93.0
      - name: Cargo dependency policy
        run: bash tests/security/run-cargo-deny.sh

  stability:
    runs-on: macos-latest
    needs: checks
    # Cold debug + release builds precede the 30-minute runtime gate.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@45f5412a0cc5dee553bb061a37369fc8e63fa137 # 1.93.0
      - name: GPU pixel conformance
        env:
          GSPLAT_REQUIRE_GPU_CONFORMANCE: "1"
        run: cargo test -p gsplat-render-wgpu --test conformance_sorted_alpha
      - name: Release stability bar
        env:
          STABILITY_SECONDS: "1800"
          RSS_GROWTH_LIMIT_KIB: "65536"
        run: bash tests/perf/run-long-stability.sh

  android-aar:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@45f5412a0cc5dee553bb061a37369fc8e63fa137 # 1.93.0
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;29.0.14206865"
      - name: Build AAR
        run: |
          ANDROID_SDK_ROOT="$ANDROID_HOME" bash bindings/android/scripts/build-aar.sh
          test -f bindings/android/gsplat-android/build/outputs/aar/gsplat-android-release.aar
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gsplat-android-aar
          path: bindings/android/gsplat-android/build/outputs/aar/gsplat-android-release.aar

  web-package:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@45f5412a0cc5dee553bb061a37369fc8e63fa137 # 1.93.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Build Web SDK package
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-bindgen-cli --version 0.2.121 --locked
          npm --prefix packages/web run check
          npm --prefix packages/web test
          bash packages/web/scripts/build.sh
      - name: Pack Web SDK package
        working-directory: packages/web
        run: npm pack --pack-destination "$GITHUB_WORKSPACE"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gsplat-web-npm
          path: gsplat-rs-web-*.tgz

  ios-xcframework:
    runs-on: macos-latest
    needs: checks
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@45f5412a0cc5dee553bb061a37369fc8e63fa137 # 1.93.0
      - name: Build XCFramework
        run: |
          bash bindings/apple/scripts/build-xcframework.sh
          ditto -c -k --keepParent \
            bindings/apple/GsplatKit/Binaries/GsplatFFI.xcframework \
            GsplatFFI.xcframework.zip
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gsplat-ios-xcframework
          path: GsplatFFI.xcframework.zip

  release:
    runs-on: ubuntu-latest
    needs: [dependency-policy, stability, android-aar, web-package, ios-xcframework]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate artifact checksums
        run: cd artifacts && sha256sum * > SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          prerelease: true
          files: |
            artifacts/gsplat-android-release.aar
            artifacts/gsplat-rs-web-*.tgz
            artifacts/GsplatFFI.xcframework.zip
            artifacts/SHA256SUMS
