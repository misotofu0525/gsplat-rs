name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: rustfmt, clippy
      - name: Cargo fmt
        run: cargo fmt --check
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cargo test
        run: cargo test --workspace

  android-aar:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;29.0.14206865"
      - name: Build AAR
        run: |
          ANDROID_SDK_ROOT="$ANDROID_HOME" bash bindings/android/scripts/build-aar.sh
          test -f bindings/android/gsplat-android/build/outputs/aar/gsplat-android-release.aar
      - uses: actions/upload-artifact@v4
        with:
          name: gsplat-android-aar
          path: bindings/android/gsplat-android/build/outputs/aar/gsplat-android-release.aar

  web-package:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build Web SDK package
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-bindgen-cli --version 0.2.121 --locked
          bash packages/web/scripts/build.sh
          npm --prefix packages/web pack --pack-destination .
      - uses: actions/upload-artifact@v4
        with:
          name: gsplat-web-npm
          path: gsplat-rs-web-*.tgz

  ios-xcframework:
    runs-on: macos-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
      - name: Build XCFramework
        run: |
          bash bindings/apple/scripts/build-xcframework.sh
          ditto -c -k --keepParent \
            bindings/apple/GsplatKit/Binaries/GsplatFFI.xcframework \
            GsplatFFI.xcframework.zip
      - uses: actions/upload-artifact@v4
        with:
          name: gsplat-ios-xcframework
          path: GsplatFFI.xcframework.zip

  release:
    runs-on: ubuntu-latest
    needs: [android-aar, web-package, ios-xcframework]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/gsplat-android-release.aar
            artifacts/gsplat-rs-web-*.tgz
            artifacts/GsplatFFI.xcframework.zip
