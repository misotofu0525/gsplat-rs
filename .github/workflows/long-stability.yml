name: Long Stability

on:
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: "Duration in seconds"
        required: false
        default: "1800"
      rss_growth_limit_kib:
        description: "RSS growth limit (KiB)"
        required: false
        default: "65536"

permissions:
  contents: read

jobs:
  long-stability:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@45f5412a0cc5dee553bb061a37369fc8e63fa137 # 1.93.0
      - name: Long stability run
        env:
          STABILITY_SECONDS: ${{ github.event.inputs.duration_seconds }}
          RSS_GROWTH_LIMIT_KIB: ${{ github.event.inputs.rss_growth_limit_kib }}
        run: bash tests/perf/run-long-stability.sh
