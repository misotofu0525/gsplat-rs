version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: "/packages/web"
    schedule:
      interval: weekly

  - package-ecosystem: gradle
    directory: "/bindings/android"
    schedule:
      interval: weekly
